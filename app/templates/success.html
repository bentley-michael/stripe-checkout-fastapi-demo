
<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ClearTariff — Report Generated</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; }
    .card { max-width: 760px; margin: 0 auto; padding: 20px; border: 1px solid #e5e5e5; border-radius: 12px; }
    h1 { margin: 0 0 12px; }
    .muted { color: #666; }
    a.button { display: inline-block; padding: 10px 16px; background: #111827; color: #fff; border-radius: 10px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>All set — your ClearTariff report should be downloading</h1>
    <p class="muted">This receipt confirms your Amazon FBA duty report purchase.</p>
    <p class="muted">If the download didn’t start, you can re-generate it below.</p>
    {% if email %}
      <p>We also emailed a copy to <b>{{ email }}</b>.</p>
    {% endif %}
    <p><a class="button" href="/form?paid=1">Generate another report</a></p>
  </div>
</body>
</html>
